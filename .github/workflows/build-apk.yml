name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/3d-game/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        working-directory: artifacts/3d-game
        env:
          PORT: 3000
          BASE_PATH: /
        run: pnpm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        working-directory: artifacts/3d-game
        run: pnpm exec cap sync android

      - name: Generate debug keystore (if not present)
        working-directory: artifacts/3d-game/android
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build debug APK
        working-directory: artifacts/3d-game/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: marble-maze-debug-apk
          path: artifacts/3d-game/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build release APK (if keystore secrets provided)
        if: ${{ vars.SIGNED_BUILD == 'true' }}
        working-directory: artifacts/3d-game/android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon

      - name: Upload release APK
        if: ${{ vars.SIGNED_BUILD == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: marble-maze-release-apk
          path: artifacts/3d-game/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
